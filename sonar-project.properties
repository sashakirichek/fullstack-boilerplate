# ── Project identity ─────────────────────────────────────────────────────────
sonar.projectKey=sashakirichek_fullstack-boilerplate
sonar.projectName=fullstack-boilerplate
# sonar.projectVersion is set through the pipeline

# ── Server / auth ─────────────────────────────────────────────────────────────
sonar.host.url=https://sonarcloud.io
# sonar.token is injected via SONAR_TOKEN environment variable in CI (GitHub Actions)
# Do NOT add it here — keep secrets out of source control

# ── Sources ───────────────────────────────────────────────────────────────────
sonar.sources=\
  backend/node-express-backend/src,\
  frontend/start-basic-react-query/src

sonar.tests=\
  backend/node-express-backend/src/__tests__,\
  frontend/start-basic-react-query/src/__tests__

sonar.sourceEncoding=UTF-8

# ── TypeScript ────────────────────────────────────────────────────────────────
sonar.typescript.tsconfigPaths=\
  backend/node-express-backend/tsconfig.json,\
  frontend/start-basic-react-query/tsconfig.json

# ── Exclusions ────────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/.output/**,\
  **/coverage/**,\
  **/routeTree.gen.ts,\
  **/*.config.ts,\
  **/*.config.js

sonar.test.inclusions=\
  **/__tests__/**/*.test.ts,\
  **/__tests__/**/*.test.tsx

# ── Coverage ──────────────────────────────────────────────────────────────────
# To enable coverage upload:
#   Jest (backend):   add --coverage --coverageReporters=lcov to jest.config.js
#   Vitest (frontend): add coverage: { reporter: ['lcov'] } to vitest.config.ts
sonar.javascript.lcov.reportPaths=\
  backend/node-express-backend/coverage/lcov.info,\
  frontend/start-basic-react-query/coverage/lcov.info
sonar.organization=sashakirichek